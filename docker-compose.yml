version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: student-dating-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: student_dating
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: unity-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # Порт для API (загрузка файлов)
      - "9001:9001" # Порт для веб-консоли (управление в браузере)
    environment:
      MINIO_ROOT_USER: unity_admin
      MINIO_ROOT_PASSWORD: unity_secure_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  pgdata:
  minio_data: